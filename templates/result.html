<!DOCTYPE html>
<html>
<head>
    <title>Your Diet Plan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        Arman Diet Planner
    </header>

    <h2 style="text-align:center; margin-top:100px;">Your Diet Plan</h2>

    <div class="plan-container">
        {% for day, meals in plan.items() %}
            <div class="day-block">
                <h3>{{ day }}</h3>
                <ul>
                    {% for meal, food in meals.items() %}
                        <li><strong>{{ meal }}:</strong> {{ food }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endfor %}
    </div>

    <div style="text-align:center; margin-top:20px;">
        <a href="{{ pdf_file }}" download>
            <button>Download PDF</button>
        </a>
    </div>
</body>
</html>
